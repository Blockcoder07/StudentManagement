<div class="sm-shell">
  <nav class="navbar navbar-expand-lg navbar-dark sm-navbar shadow-sm">
    <div class="container-fluid px-4">
      <a class="navbar-brand fw-bold" routerLink="/dashboard">
        <i class="bi bi-mortarboard-fill me-2"></i>Student Management
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sm-nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="sm-nav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
              <i class="bi bi-speedometer2 me-1"></i> Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/students" routerLinkActive="active">
              <i class="bi bi-people-fill me-1"></i> Students
            </a>
          </li>
        </ul>
        <div class="d-flex align-items-center text-light">
          <div class="me-3 text-end small">
            <div class="fw-semibold">{{ username() }}</div>
            <div class="text-light-emphasis opacity-75">{{ role() }}</div>
          </div>
          <button type="button" class="btn btn-outline-light btn-sm" (click)="logout()">
            <i class="bi bi-box-arrow-right me-1"></i> Logout
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container-fluid px-4 py-4">
    <router-outlet />
  </main>
</div>
